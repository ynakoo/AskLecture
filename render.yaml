services:
  # -------------------------------------------------------------------------
  # Backend: FastAPI + Whisper + Embeddings
  # -------------------------------------------------------------------------
  - type: web
    name: asklecture-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    # Override the command for the backend
    dockerCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    plan: free # free plan for Whisper RAM usage
    region: ohio
    envVars:
      - key: PORT
        value: 8000
      - key: WHISPER_MODEL
        value: base
      - key: GROQ_API_KEY
        sync: false # You will set this in the Render Dashboard

  # -------------------------------------------------------------------------
  # Frontend: Streamlit UI
  # -------------------------------------------------------------------------
  - type: web
    name: asklecture-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    # Override the command for the frontend
    dockerCommand: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 8501
      - key: BACKEND_URL
        fromService:
          name: asklecture-backend
          type: web
          property: host
      - key: GROQ_API_KEY
        sync: false # You will set this in the Render Dashboard
